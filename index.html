<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生物教師甄試題庫</title>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --text-muted: #718096;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --tag-cell: #dbeafe; --tag-cell-t: #1e40af;
    --tag-gene: #fef3c7; --tag-gene-t: #92400e;
    --tag-mol:  #dcfce7; --tag-mol-t:  #166534;
    --tag-ani:  #fee2e2; --tag-ani-t:  #991b1b;
    --tag-plant:#f0fdf4; --tag-plant-t:#15803d;
    --tag-eco:  #e0f2fe; --tag-eco-t:  #0369a1;
    --tag-evo:  #f5f3ff; --tag-evo-t:  #6d28d9;
    --tag-sc:   #f0fdf4; --tag-sc-t:   #166534;
    --tag-mc:   #fffbeb; --tag-mc-t:   #b45309;
    --tag-sa:   #f0f9ff; --tag-sa-t:   #0369a1;
    --tag-es:   #fdf4ff; --tag-es-t:   #7e22ce;
    --tag-sci:  #fff7ed; --tag-sci-t:  #c2410c;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
    --radius: 10px;
  }
  [data-theme="dark"] {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #f1f5f9; --text-muted: #94a3b8; --primary: #60a5fa;
    --tag-cell: #1e3a5f; --tag-cell-t: #93c5fd;
    --tag-gene: #422006; --tag-gene-t: #fcd34d;
    --tag-mol:  #052e16; --tag-mol-t:  #86efac;
    --tag-ani:  #450a0a; --tag-ani-t:  #fca5a5;
    --tag-plant:#052e16; --tag-plant-t:#4ade80;
    --tag-eco:  #0c2a3e; --tag-eco-t:  #38bdf8;
    --tag-evo:  #2e1065; --tag-evo-t:  #c4b5fd;
    --tag-sc:   #052e16; --tag-sc-t:   #4ade80;
    --tag-mc:   #451a03; --tag-mc-t:   #fbbf24;
    --tag-sa:   #0c2a3e; --tag-sa-t:   #38bdf8;
    --tag-es:   #3b0764; --tag-es-t:   #d8b4fe;
    --tag-sci:  #431407; --tag-sci-t:  #fdba74;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --shadow-lg: 0 4px 6px rgba(0,0,0,.3);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); transition: background .2s, color .2s; }

  /* ── 頂部 ── */
  header { background: var(--primary); color: #fff; padding: 16px 20px;
           display: flex; align-items: center; justify-content: space-between;
           position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-lg); }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header .meta { font-size: .78rem; opacity: .85; margin-top: 2px; }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .btn-icon { background: rgba(255,255,255,.2); border: none; border-radius: 6px;
              padding: 6px 10px; color: #fff; cursor: pointer; font-size: .85rem;
              transition: background .15s; }
  .btn-icon:hover { background: rgba(255,255,255,.35); }

  /* ── 篩選列 ── */
  .filter-bar { background: var(--surface); border-bottom: 1px solid var(--border);
                padding: 12px 20px; position: sticky; top: 57px; z-index: 90;
                display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
                box-shadow: var(--shadow); }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border);
                       border-radius: 8px; font-size: .9rem; background: var(--bg);
                       color: var(--text); outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
                       color: var(--text-muted); font-size: .9rem; pointer-events: none; }
  select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
           font-size: .85rem; background: var(--bg); color: var(--text); outline: none;
           cursor: pointer; transition: border-color .15s; }
  select:focus { border-color: var(--primary); }
  .filter-count { font-size: .82rem; color: var(--text-muted); white-space: nowrap;
                  padding: 6px 10px; background: var(--bg); border-radius: 8px;
                  border: 1px solid var(--border); }

  /* ── 主內容 ── */
  main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

  /* ── 統計卡片 ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
               gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border);
               border-radius: var(--radius); padding: 14px; text-align: center;
               box-shadow: var(--shadow); }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
  .stat-card .lbl { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }

  /* ── 題目卡片 ── */
  .q-list { display: flex; flex-direction: column; gap: 12px; }
  .q-card { background: var(--surface); border: 1px solid var(--border);
             border-radius: var(--radius); box-shadow: var(--shadow);
             overflow: hidden; transition: box-shadow .15s; }
  .q-card:hover { box-shadow: var(--shadow-lg); }
  .q-head { padding: 12px 16px; display: flex; align-items: flex-start; gap: 10px; }
  .q-num { font-size: .72rem; color: var(--text-muted); font-family: monospace;
           white-space: nowrap; padding-top: 6px; }
  .q-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 20px;
         font-size: .72rem; font-weight: 600; white-space: nowrap; }
  .tag-細胞學    { background: var(--tag-cell);  color: var(--tag-cell-t); }
  .tag-遺傳學    { background: var(--tag-gene);  color: var(--tag-gene-t); }
  .tag-分子生物學 { background: var(--tag-mol);   color: var(--tag-mol-t);  }
  .tag-動物學    { background: var(--tag-ani);   color: var(--tag-ani-t);  }
  .tag-植物學    { background: var(--tag-plant); color: var(--tag-plant-t);}
  .tag-生態學    { background: var(--tag-eco);   color: var(--tag-eco-t);  }
  .tag-演化學         { background: var(--tag-evo);   color: var(--tag-evo-t);  }
  .tag-科學探究與教學  { background: var(--tag-sci);   color: var(--tag-sci-t);  }
  .tag-single_choice  { background: var(--tag-sc);  color: var(--tag-sc-t);  }
  .tag-multiple_choice{ background: var(--tag-mc);  color: var(--tag-mc-t);  }
  .tag-short_answer   { background: var(--tag-sa);  color: var(--tag-sa-t);  }
  .tag-essay          { background: var(--tag-es);  color: var(--tag-es-t);  }
  .tag-term_explanation { background: #fdf4ff; color: #6d28d9; border: 1px solid #e9d5ff; }
  [data-theme="dark"] .tag-term_explanation { background: #3b0764; color: #d8b4fe; }
  .tag-school { background: var(--bg); color: var(--text-muted);
                border: 1px solid var(--border); }
  .q-stem { font-size: .9rem; line-height: 1.6; }
  .q-body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .options { margin: 10px 0; display: flex; flex-direction: column; gap: 5px; }
  .btn-answer { margin-top: 10px; padding: 4px 14px; border-radius: 20px;
                border: 1px solid var(--border); background: var(--bg);
                color: var(--text-muted); font-size: .8rem; cursor: pointer;
                transition: border-color .15s, color .15s; }
  .btn-answer:hover { border-color: var(--primary); color: var(--primary); }
  .q-answer.hidden { display: none; }
  .opt { display: flex; gap: 8px; font-size: .875rem; line-height: 1.5; }
  .opt-key { font-weight: 700; color: var(--primary); min-width: 20px; }
  .q-answer { margin-top: 10px; padding: 8px 12px; border-radius: 8px;
              background: var(--bg); border: 1px solid var(--border);
              font-size: .85rem; }
  .q-answer .lbl { font-weight: 600; color: var(--primary); margin-right: 6px; }
  .concepts-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .concept-tag { font-size: .72rem; padding: 2px 8px; border-radius: 20px;
                 background: var(--bg); border: 1px solid var(--border);
                 color: var(--text-muted); }
  mark { background: #fef08a; color: #1a202c; border-radius: 3px; padding: 0 1px; }
  [data-theme="dark"] mark { background: #854d0e; color: #fef9c3; }

  /* ── 空狀態 ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; }

  /* ── 勾選模式 ── */
  .q-checkbox-wrap { display: none; align-items: center; padding-right: 10px; flex-shrink: 0; }
  .select-mode .q-checkbox-wrap { display: flex; }
  .q-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
  .select-mode .q-card.selected { border: 2px solid var(--primary); background: color-mix(in srgb, var(--primary) 5%, var(--surface)); }

  /* ── 匯出列 ── */
  .export-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 2px solid var(--primary);
    padding: 12px 20px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.12); z-index: 200;
    transform: translateY(100%); transition: transform .25s ease;
  }
  .export-bar.show { transform: translateY(0); }
  .export-bar .sel-count { font-weight: 700; color: var(--primary); margin-right: auto; }
  .btn-export { padding: 8px 16px; border-radius: 8px; border: none;
    font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn-export:hover { opacity: .85; }
  .btn-pdf  { background: #ef4444; color: #fff; }
  .btn-docx { background: #2563eb; color: #fff; }
  .btn-del  { background: #dc2626; color: #fff; }
  .btn-clear { background: var(--bg); color: var(--text-muted);
    border: 1px solid var(--border); }

  /* ── 診斷模式 ── */
  .q-card.diag-warn { border-left: 4px solid #f59e0b; }
  .q-card.diag-error { border-left: 4px solid #ef4444; }
  .diag-badge { display: none; font-size: .7rem; padding: 2px 7px; border-radius: 20px;
    font-weight: 700; margin-left: 4px; }
  .diag-warn .diag-badge  { display: inline-block; background: #fef3c7; color: #92400e; }
  .diag-error .diag-badge { display: inline-block; background: #fee2e2; color: #991b1b; }
  .diag-bar { display: none; background: #fffbeb; border: 1px solid #f59e0b;
    border-radius: 10px; padding: 12px 16px; margin-bottom: 12px;
    font-size: .85rem; line-height: 1.7; }
  .diag-bar.show { display: block; }

  /* ── 列印 ── */
  @media print {
    header, .filter-bar, #stats-row, .export-bar, #empty { display: none !important; }
    body { background: #fff !important; }
    .q-list { display: block !important; }
    .q-card { display: none !important; box-shadow: none !important;
      border: 1px solid #ccc !important; margin-bottom: 16px; break-inside: avoid; }
    .q-card.print-selected { display: block !important; }
    .q-body { display: block !important; }
    .q-chevron, .q-checkbox-wrap { display: none !important; }
  }

  /* ── 編輯按鈕 ── */
  .btn-edit-card { display: none; background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 9px; font-size: .78rem; cursor: pointer;
    color: var(--text-muted); flex-shrink: 0; align-self: flex-start;
    transition: background .15s, color .15s, border-color .15s; }
  .q-card:hover .btn-edit-card { display: inline-block; }
  .btn-edit-card:hover { background: var(--bg); color: var(--primary); border-color: var(--primary); }
  .select-mode .btn-edit-card { display: none !important; }

  /* ── 行內編輯表單 ── */
  .q-edit-form { padding: 14px 16px; }
  .edit-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .edit-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .edit-field label { font-size: .78rem; color: var(--text-muted); font-weight: 600; }
  .edit-field textarea, .edit-field input, .edit-field select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: .875rem; background: var(--bg); color: var(--text);
    font-family: inherit; resize: vertical; outline: none;
    transition: border-color .15s; }
  .edit-field textarea:focus, .edit-field input:focus, .edit-field select:focus {
    border-color: var(--primary); }
  .edit-field textarea { min-height: 80px; }
  .edit-opts-grid { display: grid; grid-template-columns: 28px 1fr; gap: 5px 6px; align-items: center; }
  .edit-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
  .btn-save { background: var(--primary); color: #fff; padding: 7px 18px;
    border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: .875rem; }
  .btn-save:hover { opacity: .85; }
  .btn-cancel-edit { background: var(--bg); color: var(--text-muted); padding: 7px 14px;
    border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: .875rem; }
  .edit-status { font-size: .8rem; color: var(--text-muted); margin-left: 4px; }

  /* ── 趨勢圖面板 ── */
  .chart-panel { display: none; background: var(--surface); border-bottom: 1px solid var(--border);
                 padding: 16px 20px; }
  .chart-panel.show { display: block; }
  .chart-wrap { max-width: 860px; margin: 0 auto; position: relative; height: 260px; }

  /* ── RWD ── */
  @media (max-width: 600px) {
    .filter-bar { padding: 10px 12px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    header h1 { font-size: .95rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🧬 生物教師甄試題庫</h1>
    <div class="meta" id="db-meta">載入中…</div>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="toggleAll(true)">全顯答案</button>
    <button class="btn-icon" onclick="toggleAll(false)">全收答案</button>
    <button class="btn-icon" id="select-btn" onclick="toggleSelectMode()">勾選</button>
    <button class="btn-icon" id="chart-btn" onclick="toggleChart()">趨勢圖</button>
    <button class="btn-icon" id="diag-btn" onclick="toggleDiagMode()">診斷</button>
    <button class="btn-icon" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="filter-bar">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="search" placeholder="關鍵字搜尋題幹、概念…" oninput="render()">
  </div>
  <select id="f-topic" onchange="updateSchoolSelect();render()">
    <option value="">所有主題</option>
    <option>動物學</option><option>細胞學</option><option>植物學</option>
    <option>遺傳學</option><option>分子生物學</option><option>生態學</option>
    <option>演化學</option><option>科學探究與教學</option>
  </select>
  <select id="f-type" onchange="updateSchoolSelect();render()">
    <option value="">所有題型</option>
    <option value="single_choice">單選題</option>
    <option value="multiple_choice">多選題</option>
    <option value="short_answer">簡答題</option>
    <option value="essay">申論題</option>
    <option value="term_explanation">名詞解釋</option>
  </select>
  <select id="f-year" onchange="updateSchoolSelect();render()">
    <option value="">所有年度</option>
  </select>
  <select id="f-school" onchange="render()">
    <option value="">所有學校</option>
  </select>
  <div class="filter-count" id="filter-count">— 題</div>
</div>

<div class="chart-panel" id="chart-panel">
  <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
</div>

<main>
  <div class="diag-bar" id="diag-bar"></div>
  <div class="stats-row" id="stats-row"></div>
  <div class="q-list" id="q-list"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="icon">🔬</div>
    <div>找不到符合條件的題目</div>
  </div>
</main>

<!-- 匯出列 -->
<div class="export-bar" id="export-bar">
  <span class="sel-count" id="sel-count">已選 0 題</span>
  <button class="btn-export btn-clear" onclick="clearSelection()">清除</button>
  <button class="btn-export btn-del"  onclick="deleteSelected()">🗑 刪除選取</button>
  <button class="btn-export btn-pdf"  onclick="exportPDF()">匯出 PDF</button>
  <button class="btn-export btn-docx" onclick="exportDOCX()">匯出 DOCX</button>
</div>

<script>
let ALL = [];
let selectedIds = new Set();
let selectMode = false;

const TYPE_LABEL = {
  single_choice: '單選', multiple_choice: '多選',
  short_answer: '簡答', essay: '申論', term_explanation: '名詞解釋'
};

// ── 主題統計色 ──
const TOPIC_COLORS = {
  '細胞學':'#3b82f6','遺傳學':'#f59e0b','分子生物學':'#10b981',
  '動物學':'#ef4444','植物學':'#22c55e','生態學':'#06b6d4',
  '演化學':'#8b5cf6','科學探究與教學':'#f97316'
};

// ── Supabase 設定 ──
const SB_URL = 'https://djfidpwcqhnxztcxdxgy.supabase.co/rest/v1/questions';
const SB_KEY = 'sb_publishable_VNv5VYyZWGMIIZbDaVpUJg_o3rnLJDe';
const SB_HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

// ── 載入所有資料（分批，每批 1000 筆）──
async function loadAll() {
  const BATCH = 1000;
  let all = [], offset = 0;
  const meta = document.getElementById('db-meta');
  while (true) {
    const res = await fetch(`${SB_URL}?select=*&limit=${BATCH}&offset=${offset}&order=id`, { headers: SB_HEADERS });
    if (!res.ok) throw new Error(res.status);
    const batch = await res.json();
    all = all.concat(batch);
    meta.textContent = `載入中… ${all.length} 題`;
    if (batch.length < BATCH) break;
    offset += BATCH;
  }
  return all;
}

loadAll()
  .then(questions => {
    ALL = questions;
    document.getElementById('db-meta').textContent = `共 ${ALL.length} 題`;
    buildSelects();
    const savedSchool = loadFilters();
    updateSchoolSelect();
    if (savedSchool) document.getElementById('f-school').value = savedSchool;
    render();
  })
  .catch(() => {
    document.getElementById('db-meta').textContent = '⚠️ 無法連線到題庫';
  });

function buildSelects() {
  const years = [...new Set(ALL.map(q => q.year))].sort((a,b)=>b-a);
  const yEl = document.getElementById('f-year');
  years.forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = `民國 ${y-1911} 年（${y}）`;
    yEl.appendChild(o);
  });
  updateSchoolSelect();
}

function updateSchoolSelect() {
  const topic  = document.getElementById('f-topic').value;
  const type   = document.getElementById('f-type').value;
  const year   = document.getElementById('f-year').value;
  const sEl    = document.getElementById('f-school');
  const prev   = sEl.value;

  const schools = [...new Set(
    ALL.filter(q =>
      (!topic  || q.topic === topic) &&
      (!type   || q.type  === type)  &&
      (!year   || String(q.year) === year)
    ).map(q => q.school)
  )].sort();

  sEl.innerHTML = '<option value="">所有學校</option>';
  schools.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sEl.appendChild(o);
  });
  sEl.value = schools.includes(prev) ? prev : '';
}

// ── 篩選條件記憶（URL query string）──
function saveFilters() {
  const params = new URLSearchParams();
  const v = id => document.getElementById(id).value;
  if (v('f-topic'))  params.set('topic',  v('f-topic'));
  if (v('f-type'))   params.set('type',   v('f-type'));
  if (v('f-year'))   params.set('year',   v('f-year'));
  if (v('f-school')) params.set('school', v('f-school'));
  if (v('search'))   params.set('q',      v('search'));
  const str = params.toString();
  history.replaceState(null, '', str ? '?' + str : location.pathname);
}

function loadFilters() {
  const p = new URLSearchParams(location.search);
  const set = (id, key) => { if (p.get(key)) document.getElementById(id).value = p.get(key); };
  set('f-topic', 'topic');
  set('f-type',  'type');
  set('f-year',  'year');
  set('search',  'q');
  return p.get('school') || '';
}

// ── 篩選 ──
function getFiltered() {
  const kw     = document.getElementById('search').value.trim().toLowerCase();
  const topic  = document.getElementById('f-topic').value;
  const type   = document.getElementById('f-type').value;
  const year   = document.getElementById('f-year').value;
  const school = document.getElementById('f-school').value;

  return ALL.filter(q => {
    if (topic  && q.topic  !== topic)  return false;
    if (type   && q.type   !== type)   return false;
    if (year   && String(q.year) !== year) return false;
    if (school && q.school !== school) return false;
    if (kw) {
      const haystack = [q.stem, ...(q.concepts||[]),
        Object.values(q.options||{}).join(' ')].join(' ').toLowerCase();
      if (!kw.split(/\s+/).every(w => haystack.includes(w))) return false;
    }
    return true;
  });
}

// ── 高亮 ──
function highlight(text) {
  const kw = document.getElementById('search').value.trim();
  if (!kw) return esc(text);
  const words = kw.split(/\s+/).filter(Boolean);
  let result = esc(text);
  words.forEach(w => {
    result = result.replace(new RegExp(esc(w), 'gi'), m => `<mark>${m}</mark>`);
  });
  return result;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── 渲染 ──
function render() {
  saveFilters();
  const filtered = getFiltered();
  document.getElementById('filter-count').textContent = `${filtered.length} 題`;

  // 統計卡
  const topicCounts = {};
  filtered.forEach(q => { topicCounts[q.topic] = (topicCounts[q.topic]||0)+1; });
  const statsHTML = Object.entries(topicCounts)
    .sort((a,b)=>b[1]-a[1])
    .map(([t,c]) => `<div class="stat-card">
      <div class="num" style="color:${TOPIC_COLORS[t]||'var(--primary)'}">${c}</div>
      <div class="lbl">${t}</div>
    </div>`).join('');
  document.getElementById('stats-row').innerHTML = statsHTML;

  // 題目卡
  const listEl = document.getElementById('q-list');
  const emptyEl = document.getElementById('empty');
  if (filtered.length === 0) {
    listEl.innerHTML = ''; emptyEl.style.display = ''; return;
  }
  emptyEl.style.display = 'none';

  listEl.innerHTML = filtered.map(q => {
    const stemHtml = highlight(q.stem);
    const optionsHtml = q.options
      ? '<div class="options">' + Object.entries(q.options).map(([k,v]) =>
          `<div class="opt"><span class="opt-key">${k}</span><span>${highlight(v)}</span></div>`
        ).join('') + '</div>'
      : '';
    const answerHtml = q.answer
      ? `<div class="q-answer"><span class="lbl">答案：</span>${esc(q.answer)}</div>`
      : '';
    const conceptsHtml = (q.concepts||[]).length
      ? `<div class="concepts-row">${q.concepts.map(c=>
          `<span class="concept-tag">${esc(c)}</span>`).join('')}</div>`
      : '';

    const isSelected = selectedIds.has(q.id);
    const answerSection = q.answer
      ? `<div class="q-body">
          <button class="btn-answer" onclick="toggleAnswer('${q.id}')">查看答案</button>
          <div class="q-answer hidden" id="ans-${q.id}">
            <span class="lbl">答案：</span>${esc(q.answer)}
          </div>
        </div>`
      : '';
    return `<div class="q-card${isSelected?' selected':''}" id="card-${q.id}">
      <div class="q-head" onclick="if(selectMode)handleCardClick(event,'${q.id}')">
        <div class="q-checkbox-wrap">
          <input type="checkbox" class="q-checkbox" ${isSelected?'checked':''} onclick="event.stopPropagation();toggleSelect('${q.id}')">
        </div>
        <div style="flex:1; min-width:0;">
          <div class="q-tags">
            <span class="tag tag-${esc(q.topic)}">${esc(q.topic)}</span>
            <span class="tag tag-${esc(q.type)}">${TYPE_LABEL[q.type]||q.type}</span>
            <span class="tag tag-school">${esc(q.school.replace(/^.*?立/,'').replace(/高級中等學校|高級中學|附屬高級中學/g,''))}</span>
            <span class="tag tag-school">民${q.year-1911}</span>
          </div>
          <div class="q-stem">${stemHtml}</div>
          ${optionsHtml}
          ${conceptsHtml}
          <div class="q-num">${esc(q.id)}</div>
        </div>
        <button class="btn-edit-card" onclick="event.stopPropagation();editCard('${q.id}')">✏️ 編輯</button>
      </div>
      ${answerSection}
    </div>`;
  }).join('');
}

function handleCardClick(event, id) {
  if (selectMode) toggleSelect(id);
}
function toggleAnswer(id) {
  const ans = document.getElementById('ans-' + id);
  if (!ans) return;
  ans.classList.toggle('hidden');
  const btn = ans.previousElementSibling;
  btn.textContent = ans.classList.contains('hidden') ? '查看答案' : '收起答案';
}
function toggleAll(open) {
  document.querySelectorAll('.q-answer').forEach(el => el.classList.toggle('hidden', !open));
  document.querySelectorAll('.btn-answer').forEach(btn => {
    btn.textContent = open ? '收起答案' : '查看答案';
  });
}

// ── 勾選模式 ──
function toggleSelectMode() {
  selectMode = !selectMode;
  document.body.classList.toggle('select-mode', selectMode);
  document.getElementById('select-btn').textContent = selectMode ? '✕ 取消' : '勾選';
  if (!selectMode) { clearSelection(); }
}

function toggleSelect(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    selectedIds.add(id);
  }
  const card = document.getElementById('card-' + id);
  if (card) {
    card.classList.toggle('selected', selectedIds.has(id));
    const cb = card.querySelector('.q-checkbox');
    if (cb) cb.checked = selectedIds.has(id);
  }
  updateExportBar();
}

function updateExportBar() {
  const bar = document.getElementById('export-bar');
  document.getElementById('sel-count').textContent = `已選 ${selectedIds.size} 題`;
  bar.classList.toggle('show', selectedIds.size > 0);
}

function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.q-card.selected').forEach(c => {
    c.classList.remove('selected');
    const cb = c.querySelector('.q-checkbox');
    if (cb) cb.checked = false;
  });
  updateExportBar();
}

// ── 行內編輯 ──
function editCard(id) {
  const q = ALL.find(x => x.id === id);
  if (!q) return;

  const topicOpts = Object.keys(TOPIC_COLORS).map(t =>
    `<option value="${t}"${q.topic===t?' selected':''}>${t}</option>`).join('');
  const typeOpts = Object.entries(TYPE_LABEL).map(([v,l]) =>
    `<option value="${v}"${q.type===v?' selected':''}>${l}</option>`).join('');

  const optsHtml = q.options
    ? `<div class="edit-field"><label>選項</label>
        <div class="edit-opts-grid">
          ${Object.entries(q.options).map(([k,v]) =>
            `<span class="opt-key">${k}</span>
             <input class="edit-opt" data-key="${k}" value="${esc(v)}">`
          ).join('')}
        </div>
       </div>`
    : '';

  document.getElementById('card-' + id).innerHTML = `
    <div class="q-edit-form">
      <div class="edit-row">
        <div class="edit-field"><label>主題</label>
          <select id="et-topic-${id}">${topicOpts}</select></div>
        <div class="edit-field"><label>題型</label>
          <select id="et-type-${id}">${typeOpts}</select></div>
      </div>
      <div class="edit-field"><label>題幹</label>
        <textarea id="et-stem-${id}" rows="6">${esc(q.stem)}</textarea></div>
      ${optsHtml}
      <div class="edit-field"><label>答案</label>
        <textarea id="et-ans-${id}" rows="2">${esc(q.answer||'')}</textarea></div>
      <div class="edit-actions">
        <button class="btn-save" onclick="saveEdit('${id}')">💾 儲存</button>
        <button class="btn-cancel-edit" onclick="cancelEdit('${id}')">取消</button>
        <span class="edit-status" id="et-status-${id}"></span>
      </div>
    </div>`;
}

async function saveEdit(id) {
  const q = ALL.find(x => x.id === id);
  if (!q) return;

  const stem   = document.getElementById(`et-stem-${id}`).value.trim();
  const answer = document.getElementById(`et-ans-${id}`).value.trim();
  const topic  = document.getElementById(`et-topic-${id}`).value;
  const type   = document.getElementById(`et-type-${id}`).value;

  const optInputs = document.querySelectorAll(`#card-${id} .edit-opt`);
  let options = null;
  if (optInputs.length) {
    options = {};
    optInputs.forEach(inp => { options[inp.dataset.key] = inp.value; });
  }

  const status = document.getElementById(`et-status-${id}`);
  status.textContent = '儲存中…';

  const patch = { stem, answer, topic, type };
  if (options) patch.options = options;

  try {
    const res = await fetch(`${SB_URL}?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(patch),
    });
    if (!res.ok) throw new Error(res.status);
    Object.assign(q, { stem, answer, topic, type });
    if (options) q.options = options;
    status.textContent = '✓ 已儲存';
    setTimeout(() => render(), 600);
  } catch {
    status.textContent = '⚠️ 儲存失敗，請再試一次';
  }
}

function cancelEdit(id) { render(); }

// ── 刪除選取題目（同步 Supabase）──
async function deleteSelected() {
  if (!selectedIds.size) return;
  const n = selectedIds.size;
  if (!confirm(`確定要從題庫永久刪除這 ${n} 題嗎？\n此操作無法復原。`)) return;

  const ids = [...selectedIds];
  let done = 0, fail = 0;

  for (const id of ids) {
    try {
      const res = await fetch(`${SB_URL}?id=eq.${encodeURIComponent(id)}`, {
        method: 'DELETE', headers: SB_HEADERS,
      });
      if (res.ok) {
        const idx = ALL.findIndex(q => q.id === id);
        if (idx !== -1) ALL.splice(idx, 1);
        selectedIds.delete(id);
        done++;
      } else { fail++; }
    } catch { fail++; }
  }

  document.getElementById('db-meta').textContent = `共 ${ALL.length} 題`;
  updateExportBar();
  render();
  if (fail > 0) alert(`完成：刪除 ${done} 題，失敗 ${fail} 題。`);
}

// ── 匯出 PDF ──
function exportPDF() {
  const selected = ALL.filter(q => selectedIds.has(q.id));
  if (!selected.length) return;

  // 標記選中題目供列印
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('print-selected'));
  selected.forEach(q => {
    const card = document.getElementById('card-' + q.id);
    if (card) { card.classList.add('print-selected', 'open'); }
  });
  window.print();
  // 列印後移除標記
  setTimeout(() => {
    document.querySelectorAll('.q-card').forEach(c => c.classList.remove('print-selected'));
  }, 1000);
}

// ── 匯出 DOCX ──
async function exportDOCX() {
  const selected = ALL.filter(q => selectedIds.has(q.id));
  if (!selected.length) return;

  if (!window.docx) { alert('DOCX 函式庫載入中，請稍後再試'); return; }
  const { Document, Paragraph, TextRun, HeadingLevel, Packer, AlignmentType } = window.docx;

  const children = [];
  children.push(new Paragraph({
    children: [new TextRun({ text: '生物教師甄試題目', bold: true, size: 32 })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 400 },
  }));

  selected.forEach((q, i) => {
    children.push(new Paragraph({
      children: [new TextRun({ text: `${i+1}. ${q.stem}`, bold: true })],
      spacing: { before: 200, after: 80 },
    }));
    if (q.options) {
      Object.entries(q.options).forEach(([k, v]) => {
        children.push(new Paragraph({
          children: [new TextRun(`（${k}）${v}`)],
          indent: { left: 360 },
          spacing: { after: 40 },
        }));
      });
    }
    if (q.answer) {
      children.push(new Paragraph({
        children: [new TextRun({ text: `答案：${q.answer}`, color: '2563EB' })],
        indent: { left: 360 },
        spacing: { after: 40 },
      }));
    }
    children.push(new Paragraph({
      children: [new TextRun({ text: `【${q.topic}】${q.school} 民${q.year-1911}年`, color: '888888', size: 18 })],
      indent: { left: 360 },
      spacing: { after: 160 },
    }));
  });

  const doc = new Document({ sections: [{ properties: {}, children }] });
  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `生物甄試題目_${selected.length}題.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── 診斷模式 ──
let diagMode = false;

function countOptionSets(stem) {
  return (stem.match(/[（(][Aa][）)]/g) || []).length;
}
function hasInnerQNum(stem) {
  return /(?<!\d)\d{1,2}[\.、．]\s*[\u4e00-\u9fff下列哪何以請]/.test(stem);
}

function toggleDiagMode() {
  diagMode = !diagMode;
  document.getElementById('diag-btn').textContent = diagMode ? '✕ 診斷' : '診斷';
  if (!diagMode) {
    document.querySelectorAll('.q-card').forEach(c => {
      c.classList.remove('diag-warn','diag-error');
      const b = c.querySelector('.diag-badge');
      if (b) b.remove();
    });
    const bar = document.getElementById('diag-bar');
    bar.classList.remove('show'); bar.innerHTML = '';
    return;
  }
  runDiagnosis();
}

function runDiagnosis() {
  const cards = document.querySelectorAll('.q-card');
  let warnCount = 0, errorCount = 0;
  const problems = [];

  cards.forEach(card => {
    const id = card.id.replace('card-', '');
    const q = ALL.find(x => x.id === id);
    if (!q) return;

    const sets = countOptionSets(q.stem);
    const hasInner = hasInnerQNum(q.stem);
    const isLong = q.stem.length > 500;

    let level = null, reason = '';
    if (sets >= 2) {
      level = 'error'; reason = `含 ${sets} 組選項（可能合題）`;
      errorCount++;
    } else if (isLong && hasInner) {
      level = 'warn'; reason = `題幹過長且含內部題號`;
      warnCount++;
    } else if (isLong) {
      level = 'warn'; reason = `題幹超過 500 字`;
      warnCount++;
    }

    if (level) {
      card.classList.add(level === 'error' ? 'diag-error' : 'diag-warn');
      // 插入 badge
      const tagsDiv = card.querySelector('.q-tags');
      if (tagsDiv && !card.querySelector('.diag-badge')) {
        const badge = document.createElement('span');
        badge.className = 'diag-badge';
        badge.textContent = level === 'error' ? '⚠ 可能合題' : '⚠ 過長';
        badge.title = reason;
        tagsDiv.appendChild(badge);
      }
      problems.push({ id, school: q.school, year: q.year-1911, reason });
    }
  });

  const bar = document.getElementById('diag-bar');
  window._diagProblems = problems;
  if (warnCount + errorCount === 0) {
    bar.innerHTML = '✅ 目前顯示的題目中，未偵測到明顯合題或異常。';
  } else {
    const lines = problems.map(p =>
      `<li><code>${p.id}</code> — ${p.school} 民${p.year}年：${p.reason}</li>`
    ).join('');
    const dlBtn = `<button onclick="downloadDiagReport()" style="margin-top:10px;padding:6px 14px;border-radius:8px;border:1px solid #f59e0b;background:#fffbeb;color:#92400e;font-weight:600;cursor:pointer;">⬇ 下載問題報告（給 Claude 重新處理用）</button>`;
  bar.innerHTML = `<strong>⚠ 偵測到 ${errorCount} 題可能合題、${warnCount} 題題幹過長</strong>（紅框=嚴重、橘框=輕微）<br><ul style="margin-top:8px;padding-left:20px">${lines}</ul>${dlBtn}`;
  window._diagProblems = problems;
  }
  bar.classList.add('show');
}

function downloadDiagReport() {
  const problems = window._diagProblems || [];
  const report = {
    generated: new Date().toISOString(),
    total_problems: problems.length,
    problems: problems.map(p => ({
      id: p.id,
      school: p.school,
      year: p.year,
      reason: p.reason,
      source_file: ALL.find(q => q.id === p.id)?.source_file || ''
    }))
  };
  const blob = new Blob([JSON.stringify(report, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'diag_report.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ── 趨勢圖 ──
let _chart = null;

function toggleChart() {
  const panel = document.getElementById('chart-panel');
  const btn = document.getElementById('chart-btn');
  const showing = panel.classList.toggle('show');
  btn.textContent = showing ? '✕ 趨勢圖' : '趨勢圖';
  if (showing) renderChart();
}

function renderChart() {
  const years = [...new Set(ALL.map(q => q.year))].sort((a, b) => a - b);
  const topics = Object.keys(TOPIC_COLORS);
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  const datasets = topics.map(topic => ({
    label: topic,
    data: years.map(y => ALL.filter(q => q.year === y && q.topic === topic).length),
    borderColor: TOPIC_COLORS[topic],
    backgroundColor: TOPIC_COLORS[topic] + '33',
    borderWidth: 2,
    pointRadius: 4,
    pointHoverRadius: 6,
    tension: 0.3,
    fill: false,
  }));

  const textColor = isDark ? '#94a3b8' : '#64748b';
  const gridColor = isDark ? '#334155' : '#e2e8f0';

  const ctx = document.getElementById('trend-chart').getContext('2d');
  if (_chart) _chart.destroy();
  _chart = new Chart(ctx, {
    type: 'line',
    data: { labels: years.map(y => `民${y - 1911}`), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { color: textColor, boxWidth: 12, padding: 10, font: { size: 11 }, usePointStyle: true } },
        tooltip: { callbacks: { title: items => `民國 ${years[items[0].dataIndex] - 1911} 年` } },
      },
      scales: {
        x: { ticks: { color: textColor }, grid: { color: gridColor } },
        y: { ticks: { color: textColor }, grid: { color: gridColor },
             title: { display: true, text: '題數', color: textColor }, beginAtZero: true },
      },
    },
  });
}

// ── 深色模式 ──
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  if (document.getElementById('chart-panel').classList.contains('show')) renderChart();
}
(function initTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-btn').textContent = '☀️';
  }
})();
</script>
